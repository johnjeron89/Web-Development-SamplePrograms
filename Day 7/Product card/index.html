<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore our premium catalog of modern tech accessories and gadgets, including smartwatches, headphones, speakers, and mechanical keyboards.">
  <title>Our Products - Premium Electronics Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Our Products</h1>
    </header>

    <main class="product-grid">
      <!-- Card 1: Smart Watch -->
      <article class="product-card" id="prod-smart-watch">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/smart_watch.png" alt="Futuristic Smart Watch with glowing screen" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Smart Watch</h2>
          <div class="product-price">₹2,499</div>
          <button class="buy-button" aria-label="Buy Smart Watch">Buy Now</button>
        </div>
      </article>

      <!-- Card 2: Headphones -->
      <article class="product-card" id="prod-headphones">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/headphones.png" alt="Sleek black headphones with purple neon accents" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Headphones</h2>
          <div class="product-price">₹1,299</div>
          <button class="buy-button" aria-label="Buy Headphones">Buy Now</button>
        </div>
      </article>

      <!-- Card 3: Bluetooth Speaker -->
      <article class="product-card" id="prod-bluetooth-speaker">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/bluetooth_speaker.png" alt="Cylindrical bluetooth speaker with neon lights" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Bluetooth Speaker</h2>
          <div class="product-price">₹1,799</div>
          <button class="buy-button" aria-label="Buy Bluetooth Speaker">Buy Now</button>
        </div>
      </article>

      <!-- Card 4: Wireless Mouse -->
      <article class="product-card" id="prod-wireless-mouse">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/wireless_mouse.png" alt="Sleek wireless gaming mouse with RGB strip" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Wireless Mouse</h2>
          <div class="product-price">₹699</div>
          <button class="buy-button" aria-label="Buy Wireless Mouse">Buy Now</button>
        </div>
      </article>

      <!-- Card 5: Keyboard -->
      <article class="product-card" id="prod-keyboard">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/keyboard.png" alt="Sleek mechanical keyboard with subtle backlighting" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Keyboard</h2>
          <div class="product-price">₹1,499</div>
          <button class="buy-button" aria-label="Buy Keyboard">Buy Now</button>
        </div>
      </article>

      <!-- Card 6: Power Bank -->
      <article class="product-card" id="prod-power-bank">
        <div class="product-image-wrapper">
          <img class="product-image" src="assets/power_bank.png" alt="Sleek matte black power bank with wireless charging display" loading="lazy">
        </div>
        <div class="product-info">
          <h2 class="product-title">Power Bank</h2>
          <div class="product-price">₹999</div>
          <button class="buy-button" aria-label="Buy Power Bank">Buy Now</button>
        </div>
      </article>
    </main>
  </div>
</body>
</html>
