<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
</head>
<body>
    <h1>Job Application Form</h1>
    <form>
      Full Name:
        <input type="text" name="fullname"><br><br>
        Email:
        <input type="email" name="email"><br><br>
        Phone Number:
        <input type="tel" name="phone"><br><br>
        Gender:
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>
        Skills:
        <input type="checkbox" name="skill" value="JAVA"> HTML<br>
        <input type="checkbox" name="skill" value="C++"> CSS<br>
        <input type="checkbox" name="skill" value="C"> JavaScript<br>
        <input type="checkbox" name="skill" value="Python"> Python<br><br>
        Upload Resume:
        <input type="file" name="resume"><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
