<!DOCTYPE html>
<html>
<head>
<title>Student Report Card</title>
<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
    padding: 10px;
    text-align: center;
  }
</style>
</head>
<body>

<h2>Student Report Card</h2>

<table>
  <tr>
    <th>Subject</th>
    <th>Marks</th>
    <th>Grade</th>
  </tr>
  <tr>
    <td>Mathematics</td>
    <td>95</td>
    <td>A+</td>
  </tr>
  <tr>
    <td>Science</td>
    <td>88</td>
    <td>A</td>
  </tr>
  <tr>
    <td>English</td>
    <td>92</td>
    <td>A+</td>
  </tr>
  <tr>
    <td>History</td>
    <td>85</td>
    <td>B+</td>
  </tr>
  <tr>
    <td>Computer Science</td>
    <td>98</td>
    <td>A+</td>
  </tr>
</table>

</body>
</html>
